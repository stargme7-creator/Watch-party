<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchParty - YouTube Sync + Dailymotion (No Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Dailymotion Player SDK (only for standalone player, no sync) -->
    <script src="https://geo.dailymotion.com/player.js"></script>
    <style>
        body { background-color: #0d0e15; color: #ffffff; font-family: sans-serif; }
        .pink-glow { text-shadow: 0 0 10px #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        .panel-bg { background-color: #141622; border: 1px solid #1f2335; }
        #messages { height: 220px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg-item { margin-bottom: 6px; padding: 4px 8px; border-bottom: 1px solid #1f2335; }
        .msg-user { color: #ff007f; font-weight: bold; }
        iframe, video { width: 100%; height: 100%; border-radius: 8px; border: none; }
        .dm-player-container { width: 100%; height: 100%; }
        .error-toast { background: #ff4444; color: white; padding: 8px 16px; border-radius: 8px; position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: none; font-size: 14px; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen justify-center items-center">

    <div id="error-toast" class="error-toast"></div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="w-full max-w-md panel-bg p-6 rounded-xl space-y-4">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-pink-500 pink-glow inline-block px-4 py-1 rounded-md mb-2">
                <i class="fa-solid fa-clapperboard"></i> WatchParty
            </h1>
            <p class="text-xs text-gray-400">YouTube sync ke saath, Dailymotion sirf aapke liye</p>
        </div>
        <div id="auth-tabs" class="flex border-b border-gray-800 text-sm font-semibold">
            <button id="tab-login" onclick="toggleAuthForm('login')" class="flex-1 pb-2 border-b-2 border-pink-500 text-pink-500">Login</button>
            <button id="tab-register" onclick="toggleAuthForm('register')" class="flex-1 pb-2 border-b-2 border-transparent text-gray-400">Register</button>
        </div>
        <div id="login-form" class="space-y-3">
            <input type="email" id="login-email" placeholder="Email Address" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
            <input type="password" id="login-pass" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
            <button onclick="handleLogin()" class="w-full bg-pink-600 hover:bg-pink-700 py-2 rounded font-bold text-sm">Sign In</button>
        </div>
        <div id="register-form" class="space-y-3 hidden">
            <input type="text" id="reg-user" placeholder="Username" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
            <input type="email" id="reg-email" placeholder="Email" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
            <input type="password" id="reg-pass" placeholder="Password" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
            <button onclick="handleRegister()" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold text-sm">Create Account</button>
        </div>
        <div id="lobby-panel" class="pt-4 border-t border-gray-800 space-y-3 hidden">
            <div class="flex justify-between items-center">
                <div class="text-xs font-bold text-pink-400">Welcome, <span id="welcome-user" class="text-white">User</span></div>
                <button onclick="handleLogout()" class="text-xs text-red-400"><i class="fa-solid fa-power-off"></i> Logout</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="join-room-id" placeholder="ROOM ID" class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-1.5 text-sm font-mono">
                <button onclick="enterPartyRoom('join')" class="bg-purple-600 hover:bg-purple-700 px-4 rounded text-xs font-bold">Join Room</button>
            </div>
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-800"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-xs">OR</span>
                <div class="flex-grow border-t border-gray-800"></div>
            </div>
            <button onclick="enterPartyRoom('create')" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-700 hover:to-purple-700 py-2 rounded font-bold text-sm">Create Room</button>
        </div>
    </div>

    <!-- PARTY ROOM SCREEN -->
    <div id="party-room-screen" class="w-full max-w-4xl space-y-4 hidden">
        <div class="flex justify-between items-center bg-gray-900/40 p-3 rounded-lg border border-gray-800/60">
            <h1 class="text-2xl font-bold text-pink-500 pink-glow flex items-center gap-2"><i class="fa-solid fa-clapperboard"></i> WatchParty</h1>
            <div class="flex items-center gap-4">
                <div class="text-sm text-gray-400">Room: <span id="room-display-id" class="text-white font-mono bg-gray-800 px-2 py-1 rounded">---</span></div>
                <button onclick="leavePartyRoom()" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1 rounded"><i class="fa-solid fa-arrow-left"></i> Leave</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <button class="bg-red-600 hover:bg-red-700 py-2 rounded font-bold text-sm">YouTube</button>
            <button class="bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold text-sm">Dailymotion</button>
            <button id="mic-toggle-btn" onclick="toggleMicPipeline()" class="bg-gray-600 hover:bg-gray-700 py-2 rounded font-bold text-sm"><i class="fa-solid fa-microphone-slash"></i> Mic Off</button>
        </div>
        <div class="flex gap-2">
            <input type="text" id="video-url-input" placeholder="YouTube, Dailymotion ya MP4 link..." class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
            <button onclick="loadVideo()" class="bg-red-600 hover:bg-red-700 px-5 rounded text-white"><i class="fa-solid fa-play"></i></button>
        </div>
        <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden panel-bg">
            <div id="player-container" class="w-full h-full">
                <div id="fallback-placeholder" class="w-full h-full flex flex-col items-center justify-center text-gray-500 p-4 text-center">
                    <i class="fa-solid fa-film text-4xl mb-2"></i>
                    <p class="font-semibold text-sm">Video link paste karo aur play karo</p>
                    <p class="text-xs mt-1">YouTube video sync hoga, Dailymotion sirf aapke liye</p>
                </div>
            </div>
        </div>
        <div id="remote-audios" class="hidden"></div>
        <div class="flex justify-between bg-gray-900/50 p-2 rounded-lg border border-gray-800">
            <button onclick="sendReaction('❤️')" class="text-xl">❤️</button><button onclick="sendReaction('😂')" class="text-xl">😂</button>
            <button onclick="sendReaction('😮')" class="text-xl">😮</button><button onclick="sendReaction('😢')" class="text-xl">😢</button>
            <button onclick="sendReaction('👏')" class="text-xl">👏</button><button onclick="sendReaction('🔥')" class="text-xl">🔥</button>
            <button onclick="sendReaction('💀')" class="text-xl">💀</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="panel-bg p-3 rounded-lg md:col-span-1">
                <h3 class="text-pink-400 font-bold text-xs uppercase"><i class="fa-solid fa-users"></i> Room Users</h3>
                <div id="user-list" class="space-y-1 text-sm font-medium text-gray-300 mt-2"></div>
            </div>
            <div class="panel-bg p-3 rounded-lg md:col-span-2 flex flex-col justify-between">
                <h3 class="text-pink-400 font-bold text-xs uppercase"><i class="fa-solid fa-comments"></i> Live Chat</h3>
                <div id="messages" class="mb-2 h-40 overflow-y-auto"></div>
                <div class="flex gap-2 border-t border-gray-800 pt-2">
                    <input type="text" id="msg-input" onkeypress="if(event.key==='Enter') sendMessage()" placeholder="Kuch chat karo..." class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-1.5 text-sm">
                    <button onclick="sendMessage()" class="bg-pink-600 hover:bg-pink-700 px-4 rounded text-xs">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ------------------- GLOBALS -------------------
        let socket;
        let ytPlayer = null;
        let dmPlayer = null;
        let activePlayerType = null; // 'youtube', 'dailymotion', 'raw'
        let ignoreSyncEvents = false;
        const peers = {};

        const state = {
            roomId: '',
            username: localStorage.getItem('wp_username') || '',
            token: localStorage.getItem('wp_token') || '',
            micActive: false,
            localStream: null
        };

        let rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'turn:relay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // ------------------- AUTH -------------------
        function toggleAuthForm(mode) {
            const loginF = document.getElementById('login-form');
            const regF = document.getElementById('register-form');
            const tabL = document.getElementById('tab-login');
            const tabR = document.getElementById('tab-register');
            if (mode === 'login') {
                loginF.classList.remove('hidden'); regF.classList.add('hidden');
                tabL.className = "flex-1 pb-2 border-b-2 border-pink-500 text-pink-500";
                tabR.className = "flex-1 pb-2 border-b-2 border-transparent text-gray-400";
            } else {
                regF.classList.remove('hidden'); loginF.classList.add('hidden');
                tabR.className = "flex-1 pb-2 border-b-2 border-pink-500 text-pink-500";
                tabL.className = "flex-1 pb-2 border-b-2 border-transparent text-gray-400";
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    state.username = data.username;
                    state.token = data.token;
                    localStorage.setItem('wp_username', data.username);
                    localStorage.setItem('wp_token', data.token);
                    showLobbyView();
                } else { alert(data.message); }
            } catch (err) { alert("Database error!"); }
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    state.username = data.username;
                    state.token = data.token;
                    localStorage.setItem('wp_username', data.username);
                    localStorage.setItem('wp_token', data.token);
                    showLobbyView();
                    alert("Account Created!");
                } else { alert(data.message); }
            } catch (err) { alert("Registration failed!"); }
        }

        function showLobbyView() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('auth-tabs').classList.add('hidden');
            document.getElementById('lobby-panel').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = state.username;
        }

        function handleLogout() {
            localStorage.removeItem('wp_username');
            localStorage.removeItem('wp_token');
            state.username = '';
            state.token = '';
            document.getElementById('lobby-panel').classList.add('hidden');
            document.getElementById('auth-tabs').classList.remove('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        }

        function enterPartyRoom(action) {
            if (action === 'create') {
                state.roomId = 'ROOM_' + Math.floor(1000 + Math.random() * 9000);
            } else {
                const rInput = document.getElementById('join-room-id').value.trim().toUpperCase();
                if (!rInput) return alert("Enter Room ID!");
                state.roomId = rInput;
            }
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('party-room-screen').classList.remove('hidden');
            document.getElementById('room-display-id').innerText = state.roomId;
            if (socket) socket.disconnect();
            socket = io();
            socket.emit('join-room', { roomId: state.roomId, username: state.username });
            setupSocketListeners();
        }

        function leavePartyRoom() {
            if (socket) { socket.emit('leave-room', state.roomId); socket.disconnect(); }
            if (state.localStream) {
                state.localStream.getTracks().forEach(t => t.stop());
                state.micActive = false;
                const btn = document.getElementById('mic-toggle-btn');
                btn.innerHTML = `<i class="fa-solid fa-microphone-slash"></i> Mic Off`;
                btn.className = "bg-gray-600 hover:bg-gray-700 py-2 rounded font-bold text-sm flex items-center justify-center gap-2";
            }
            Object.keys(peers).forEach(id => { if (peers[id]) peers[id].close(); delete peers[id]; });
            document.getElementById('remote-audios').innerHTML = '';
            document.getElementById('party-room-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            showLobbyView();
        }

        // ------------------- MIC & WEBRTC -------------------
        async function toggleMicPipeline() {
            const btn = document.getElementById('mic-toggle-btn');
            if (!state.micActive) {
                try {
                    state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    state.micActive = true;
                    btn.innerHTML = `<i class="fa-solid fa-microphone text-green-400"></i> Mic On`;
                    btn.className = "bg-green-700 hover:bg-green-800 py-2 rounded font-bold text-sm flex items-center justify-center gap-2";
                    state.localStream.getAudioTracks().forEach(track => {
                        Object.values(peers).forEach(pc => { pc.addTrack(track, state.localStream); });
                    });
                } catch (err) { showError("Mic permission nahi mili"); }
            } else {
                if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
                state.micActive = false;
                btn.innerHTML = `<i class="fa-solid fa-microphone-slash"></i> Mic Off`;
                btn.className = "bg-gray-600 hover:bg-gray-700 py-2 rounded font-bold text-sm flex items-center justify-center gap-2";
            }
        }

        function initPeerConnection(targetUserId, initiateOffer = false) {
            if (peers[targetUserId]) return peers[targetUserId];
            const pc = new RTCPeerConnection(rtcConfig);
            peers[targetUserId] = pc;
            if (state.localStream) {
                state.localStream.getAudioTracks().forEach(track => pc.addTrack(track, state.localStream));
            }
            pc.onicecandidate = (event) => { if (event.candidate) socket.emit('webrtc-ice', targetUserId, event.candidate); };
            pc.ontrack = (event) => {
                let audioEl = document.getElementById(`audio-${targetUserId}`);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = `audio-${targetUserId}`;
                    audioEl.autoplay = true;
                    document.getElementById('remote-audios').appendChild(audioEl);
                }
                audioEl.srcObject = event.streams[0];
                audioEl.play().catch(() => {
                    document.body.addEventListener('click', () => { audioEl.play(); }, { once: true });
                });
            };
            if (initiateOffer) {
                pc.createOffer().then(offer => pc.setLocalDescription(offer)).then(() => {
                    socket.emit('webrtc-offer', targetUserId, pc.localDescription);
                });
            }
            return pc;
        }

        // ------------------- VIDEO PARSING & LOADING -------------------
        function parseVideoUrl(url) {
            if (!url) return null;
            url = url.trim();
            if (url.match(/\.(mp4|webm|ogg|m3u8)($|\?)/i)) return { type: 'raw', id: url };
            const ytRegex = /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=))([\w-]{11})/;
            const ytMatch = url.match(ytRegex);
            if (ytMatch) return { type: 'youtube', id: ytMatch[1] };
            const dmRegex = /dailymotion\.com\/video\/([a-zA-Z0-9]+)/;
            const dmMatch = url.match(dmRegex);
            if (dmMatch) return { type: 'dailymotion', id: dmMatch[1] };
            return null;
        }

        function destroyPlayers() {
            if (ytPlayer && typeof ytPlayer.destroy === 'function') ytPlayer.destroy();
            if (dmPlayer && typeof dmPlayer.destroy === 'function') dmPlayer.destroy();
            ytPlayer = null;
            dmPlayer = null;
            activePlayerType = null;
        }

        // Dailymotion: local only, no events sent to server
        function initDailymotionLocal(videoId) {
            const container = document.createElement('div');
            container.id = 'dm-player-container';
            container.className = 'w-full h-full';
            document.getElementById('player-container').innerHTML = '';
            document.getElementById('player-container').appendChild(container);
            dmPlayer = DM.player(container, {
                video: videoId,
                params: { autoplay: true, controls: true, 'api': true },
                events: {
                    apiready: () => console.log("DM ready (no sync)"),
                    error: (e) => showError("Dailymotion error")
                }
            });
        }

        // YouTube: with sync
        function onYouTubeStateChange(event) {
            if (ignoreSyncEvents) return;
            if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
            const t = ytPlayer.getCurrentTime();
            if (event.data === YT.PlayerState.PLAYING) {
                socket.emit('video-sync', state.roomId, { action: 'play', time: t });
            } else if (event.data === YT.PlayerState.PAUSED) {
                socket.emit('video-sync', state.roomId, { action: 'pause', time: t });
            }
        }

        function loadVideo() {
            const url = document.getElementById('video-url-input').value;
            const meta = parseVideoUrl(url);
            if (!meta) {
                showError("Invalid URL. Use YouTube, Dailymotion or MP4 link.");
                return;
            }
            destroyPlayers();
            const container = document.getElementById('player-container');
            if (meta.type === 'youtube') {
                activePlayerType = 'youtube';
                container.innerHTML = `<div id="yt-iframe-placeholder" class="w-full h-full"></div>`;
                ytPlayer = new YT.Player('yt-iframe-placeholder', {
                    videoId: meta.id,
                    playerVars: { autoplay: 1, controls: 1, rel: 0, enablejsapi: 1 },
                    events: {
                        onStateChange: onYouTubeStateChange,
                        onError: () => showError("YouTube error")
                    }
                });
            } else if (meta.type === 'dailymotion') {
                activePlayerType = 'dailymotion';
                initDailymotionLocal(meta.id);
                // No sync events attached
            } else if (meta.type === 'raw') {
                activePlayerType = 'raw';
                container.innerHTML = `<video id="raw-video" controls autoplay class="w-full h-full"><source src="${meta.id}" type="video/mp4"></video>`;
                const videoEl = document.getElementById('raw-video');
                videoEl.onerror = () => showError("MP4 load failed");
                // raw video sync optional? but we keep it local only to avoid complexity; if you want raw sync, can add but let's keep as local per user
                // To be consistent with Dailymotion, raw also no sync.
            }
        }

        // Apply YouTube sync from socket (only if activePlayerType is youtube)
        async function applySync(data) {
            if (activePlayerType !== 'youtube') return;
            if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
            ignoreSyncEvents = true;
            try {
                const localTime = ytPlayer.getCurrentTime();
                if (Math.abs(localTime - data.time) > 1.5) ytPlayer.seekTo(data.time, true);
                if (data.action === 'play') ytPlayer.playVideo();
                else if (data.action === 'pause') ytPlayer.pauseVideo();
            } catch(e) { console.warn(e); }
            setTimeout(() => { ignoreSyncEvents = false; }, 400);
        }

        // ------------------- CHAT & REACTIONS -------------------
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            socket.emit('chat-message', state.roomId, state.username, input.value.trim());
            input.value = '';
        }
        function sendReaction(emoji) { socket.emit('reaction', state.roomId, emoji); }

        // ------------------- SOCKET LISTENERS -------------------
        function setupSocketListeners() {
            socket.on('receive-chat', ({ user, msg }) => {
                const box = document.getElementById('messages');
                const item = document.createElement('div');
                item.className = 'msg-item';
                item.innerHTML = `<span class="msg-user">${user}:</span> ${msg}`;
                box.appendChild(item);
                box.scrollTop = box.scrollHeight;
            });

            socket.on('receive-reaction', (emoji) => {
                // optional: show floating emoji
            });

            socket.on('video-sync', async (data) => {
                if (!data) return;
                if (data.action === 'loadNewVideo' && data.meta) {
                    // ignore loadNewVideo from others to avoid forced loads
                    return;
                }
                await applySync(data);
            });

            socket.on('new-peer', (targetUserId) => { initPeerConnection(targetUserId, true); });
            socket.on('webrtc-offer', (fromId, offer) => {
                const pc = initPeerConnection(fromId, false);
                pc.setRemoteDescription(new RTCSessionDescription(offer)).then(() => pc.createAnswer())
                    .then(answer => pc.setLocalDescription(answer))
                    .then(() => socket.emit('webrtc-answer', fromId, pc.localDescription));
            });
            socket.on('webrtc-answer', (fromId, answer) => { if (peers[fromId]) peers[fromId].setRemoteDescription(new RTCSessionDescription(answer)); });
            socket.on('webrtc-ice', (fromId, candidate) => { if (peers[fromId]) peers[fromId].addIceCandidate(new RTCIceCandidate(candidate)); });
            socket.on('peer-disconnected', (targetUserId) => {
                if (peers[targetUserId]) { peers[targetUserId].close(); delete peers[targetUserId]; }
                const audioEl = document.getElementById(`audio-${targetUserId}`);
                if (audioEl) audioEl.remove();
            });

            socket.on('room-users-update', (data) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                if (!data.users || data.users.length === 0) {
                    list.innerHTML = '<div class="text-xs text-gray-500 italic">Empty</div>';
                    return;
                }
                data.users.forEach(user => {
                    list.innerHTML += `<div class="flex items-center justify-between p-1">
                        <div class="flex items-center gap-2"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span><span class="text-sm font-medium">${user}</span></div>
                        <span class="text-[10px] bg-green-500/10 text-green-400 border px-1.5 py-0.5 rounded-full">Online</span>
                    </div>`;
                });
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (state.token && state.username) showLobbyView();
        });
    </script>
    <footer class="text-center text-xs text-gray-500 mt-4">
