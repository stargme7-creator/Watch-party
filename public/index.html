<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchParty - Saath Dekho</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #fff; font-family: Arial, sans-serif; }
#home-screen { text-align: center; padding: 80px 20px; }
#home-screen h1 { font-size: 2.5em; color: #e91e8c; margin-bottom: 10px; }
#home-screen p { color: #aaa; margin-bottom: 40px; }
.input-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
input { padding: 15px 25px; border-radius: 10px; border: 2px solid #e91e8c; background: #1a1a2e; color: #fff; font-size: 1em; width: 300px; outline: none; }
button { padding: 15px 35px; border-radius: 10px; border: none; background: #e91e8c; color: #fff; font-size: 1em; cursor: pointer; width: 300px; }
button:hover { opacity: 0.85; }
#party-screen { display: none; flex-direction: column; height: 100vh; }
.top-bar { background: #1a1a2e; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.top-bar h2 { color: #e91e8c; font-size: 1.1em; }
.top-bar-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.top-bar-btns button { width: auto; padding: 8px 12px; font-size: 0.8em; }
#btn-youtube { background: #ff0000; }
#btn-screen { background: #9c27b0; }
#btn-mic { background: #2196f3; }
#btn-mic.active { background: #f44336; }
#btn-copy { background: #4caf50; }
.main-area { display: flex; gap: 10px; padding: 10px; flex: 1; overflow: hidden; }
.video-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
#url-bar { display: none; gap: 8px; }
#url-bar input { flex: 1; width: auto; padding: 10px; font-size: 0.9em; }
#url-bar button { width: auto; padding: 10px 15px; font-size: 0.9em; background: #ff0000; }
#player-container { flex: 1; background: #000; border-radius: 10px; overflow: hidden; position: relative; min-height: 250px; }
#player { width: 100%; height: 100%; }
#screen-video { width: 100%; height: 100%; object-fit: contain; display: none; background: #000; border-radius: 10px; }
#remote-screen-video { width: 100%; height: 100%; object-fit: contain; display: none; background: #000; border-radius: 10px; }
#screen-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 1em; text-align: center; padding: 20px; flex-direction: column; gap: 10px; }
#screen-placeholder p { color: #777; font-size: 0.85em; }
.side-panel { width: 260px; display: flex; flex-direction: column; gap: 10px; }
.users-box { background: #1a1a2e; border-radius: 10px; padding: 12px; }
.users-box h3 { color: #e91e8c; margin-bottom: 8px; font-size: 0.9em; }
#users-list { list-style: none; }
#users-list li { padding: 4px 0; color: #ccc; font-size: 0.85em; }
#users-list li::before { content: "🟢 "; }
.chat-box { background: #1a1a2e; border-radius: 10px; padding: 12px; flex: 1; display: flex; flex-direction: column; }
.chat-box h3 { color: #e91e8c; margin-bottom: 8px; font-size: 0.9em; }
#messages { flex: 1; overflow-y: auto; margin-bottom: 10px; max-height: 280px; }
#messages div { padding: 5px 0; border-bottom: 1px solid #2a2a3e; font-size: 0.85em; color: #ddd; }
#messages div span { color: #e91e8c; font-weight: bold; }
.chat-input { display: flex; gap: 8px; }
#msg-input { flex: 1; width: auto; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #0f0f1a; color: #fff; font-size: 0.85em; outline: none; }
#send-btn { width: auto; padding: 8px 12px; font-size: 0.85em; }
@media(max-width: 768px) {
  .main-area { flex-direction: column; }
  .side-panel { width: 100%; }
}
</style>
</head>
<body>

<div id="home-screen">
  <h1>🎬 WatchParty</h1>
  <p>Apne dosto ke saath movies aur dramas saath dekho!</p>
  <div class="input-group">
    <input type="text" id="username-input" placeholder="Apna naam likho..." />
    <button onclick="createRoom()">🏠 Naya Room Banao</button>
    <input type="text" id="join-room-input" placeholder="Room ID likho..." />
    <button onclick="joinRoom()" style="background:#673ab7">🔗 Room Join Karo</button>
  </div>
</div>

<div id="party-screen">
  <div class="top-bar">
    <h2>🎬 WatchParty</h2>
    <span id="room-id-display" style="color:#aaa;font-size:0.85em"></span>
    <div class="top-bar-btns">
      <button id="btn-youtube" onclick="toggleUrlBar()">📺 YouTube</button>
      <button id="btn-screen" onclick="startScreenShare()">🖥️ Screen Share</button>
      <button id="btn-mic" onclick="toggleMic()">🎙️ Mic ON</button>
      <button id="btn-copy" onclick="copyRoomId()">📋 Room ID</button>
    </div>
  </div>
  <div class="main-area">
    <div class="video-section">
      <div id="url-bar">
        <input type="text" id="youtube-url" placeholder="YouTube link paste karo..." onkeydown="if(event.key==='Enter') loadVideo()" />
        <button onclick="loadVideo()">▶ Chalao</button>
      </div>
      <div id="player-container">
        <div id="screen-placeholder">
          <span style="font-size:2em">🎬</span>
          <span>YouTube ya Screen Share karo</span>
          <p>Netflix, Motion, koi bhi app screen share se dekho!</p>
        </div>
        <div id="player"></div>
        <video id="screen-video" autoplay playsinline muted></video>
        <video id="remote-screen-video" autoplay playsinline></video>
      </div>
    </div>
    <div class="side-panel">
      <div class="users-box">
        <h3>👥 Online Users</h3>
        <ul id="users-list"></ul>
      </div>
      <div class="chat-box">
        <h3>💬 Live Chat</h3>
        <div id="messages"></div>
        <div class="chat-input">
          <input type="text" id="msg-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMessage()" />
          <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let roomId = '';
let username = '';
let player = null;
let micStream = null;
let screenStream = null;
let isMicOn = false;
let isSyncing = false;
let urlBarVisible = false;
let peerConnection = null;
let mySocketId = null;

const iceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};

socket.on('connect', () => { mySocketId = socket.id; });

// YouTube API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
function onYouTubeIframeAPIReady() {}

function toggleUrlBar() {
  urlBarVisible = !urlBarVisible;
  document.getElementById('url-bar').style.display = urlBarVisible ? 'flex' : 'none';
}

function loadVideo() {
  const url = document.getElementById('youtube-url').value;
  const videoId = extractYouTubeId(url);
  if (!videoId) return alert('Sahi YouTube link dalo!');
  document.getElementById('screen-placeholder').style.display = 'none';
  document.getElementById('screen-video').style.display = 'none';
  document.getElementById('remote-screen-video').style.display = 'none';
  if (player) {
    player.loadVideoById(videoId);
  } else {
    player = new YT.Player('player', {
      videoId: videoId,
      width: '100%',
      height: '100%',
      playerVars: { autoplay: 1, controls: 1 },
      events: { onStateChange: onPlayerStateChange }
    });
  }
  socket.emit('video-sync', roomId, { action: 'load', videoId, time: 0 });
}

function extractYouTubeId(url) {
  const match = url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/);
  return match ? match[1] : null;
}

function onPlayerStateChange(event) {
  if (!player || isSyncing) return;
  const time = player.getCurrentTime();
  if (event.data === YT.PlayerState.PLAYING) {
    socket.emit('video-sync', roomId, { action: 'play', time });
  } else if (event.data === YT.PlayerState.PAUSED) {
    socket.emit('video-sync', roomId, { action: 'pause', time });
  }
}

socket.on('video-sync', (data) => {
  if (!player) return;
  isSyncing = true;
  if (data.action === 'load') {
    document.getElementById('screen-placeholder').style.display = 'none';
    player.loadVideoById(data.videoId);
  } else if (data.action === 'play') {
    player.seekTo(data.time, true);
    player.playVideo();
  } else if (data.action === 'pause') {
    player.seekTo(data.time, true);
    player.pauseVideo();
  } else if (data.action === 'sync') {
    player.seekTo(data.time, true);
  }
  setTimeout(() => { isSyncing = false; }, 1000);
});

// Screen Share (WebRTC)
async function startScreenShare() {
  try {
    if (screenStream) {
      stopScreenShare();
      return;
    }
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 15 },
      audio: true
    });

    const localVideo = document.getElementById('screen-video');
    localVideo.srcObject = screenStream;
    localVideo.style.display = 'block';
    document.getElementById('screen-placeholder').style.display = 'none';
    document.getElementById('btn-screen').textContent = '🖥️ Share Band Karo';
    document.getElementById('btn-screen').style.background = '#f44336';

    socket.emit('screen-share-started', roomId);

    // Create peer connection
    peerConnection = new RTCPeerConnection(iceConfig);
    screenStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, screenStream);
    });

    if (micStream) {
      micStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, micStream);
      });
    }

    peerConnection.onicecandidate = (e) => {
      if (e.candidate) {
        socket.emit('webrtc-ice', roomId, e.candidate);
      }
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit('webrtc-offer', roomId, offer);

    screenStream.getVideoTracks()[0].onended = stopScreenShare;
    addMessage('System', '🖥️ Screen share shuru! Dost ko dikha raha hai!');

  } catch(e) {
    addMessage('System', '❌ Screen share nahi hua — permission do ya browser support check karo!');
  }
}

function stopScreenShare() {
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  screenStream = null;
  if (peerConnection) { peerConnection.close(); peerConnection = null; }
  document.getElementById('screen-video').style.display = 'none';
  document.getElementById('screen-placeholder').style.display = 'flex';
  document.getElementById('btn-screen').textContent = '🖥️ Screen Share';
  document.getElementById('btn-screen').style.background = '#9c27b0';
  socket.emit('screen-share-stopped', roomId);
  addMessage('System', '🖥️ Screen share band ho gaya!');
}

// WebRTC Signaling
socket.on('webrtc-offer', async (fromId, offer) => {
  peerConnection = new RTCPeerConnection(iceConfig);

  peerConnection.ontrack = (e) => {
    const remoteVideo = document.getElementById('remote-screen-video');
    remoteVideo.srcObject = e.streams[0];
    remoteVideo.style.display = 'block';
    document.getElementById('screen-placeholder').style.display = 'none';
    document.getElementById('screen-video').style.display = 'none';
  };

  peerConnection.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('webrtc-ice', fromId, e.candidate);
    }
  };

  await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit('webrtc-answer', fromId, answer);
});

socket.on('webrtc-answer', async (fromId, answer) => {
  if (peerConnection) {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  }
});

socket.on('webrtc-ice', async (fromId, candidate) => {
  if (peerConnection) {
    try { await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
  }
});

socket.on('screen-share-started', (fromId, fromUsername) => {
  addMessage('System', '🖥️ ' + fromUsername + ' screen share kar raha hai!');
});

socket.on('screen-share-stopped', () => {
  document.getElementById('remote-screen-video').style.display = 'none';
  document.getElementById('screen-placeholder').style.display = 'flex';
  addMessage('System', '🖥️ Screen share band ho gaya!');
});

socket.on('peer-disconnected', () => {
  if (peerConnection) { peerConnection.close(); peerConnection = null; }
  document.getElementById('remote-screen-video').style.display = 'none';
});

// Room
function createRoom() {
  username = document.getElementById('username-input').value.trim();
  if (!username) return alert('Pehle apna naam likho!');
  roomId = Math.random().toString(36).substr(2, 8).toUpperCase();
  enterParty();
}

function joinRoom() {
  username = document.getElementById('username-input').value.trim();
  const inputRoom = document.getElementById('join-room-input').value.trim().toUpperCase();
  if (!username) return alert('Pehle apna naam likho!');
  if (!inputRoom) return alert('Room ID likho!');
  roomId = inputRoom;
  enterParty();
}

function enterParty() {
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('party-screen').style.display = 'flex';
  document.getElementById('room-id-display').textContent = 'Room: ' + roomId;
  socket.emit('join-room', roomId, username);
}

function copyRoomId() {
  navigator.clipboard.writeText(roomId);
  alert('Room ID copy ho gaya: ' + roomId + '\nDosto ko bhejo! 🎉');
}

// Chat
function sendMessage() {
  const msg = document.getElementById('msg-input').value.trim();
  if (!msg) return;
  socket.emit('chat-message', roomId, username, msg);
  document.getElementById('msg-input').value = '';
}

function addMessage(user, msg) {
  const div = document.createElement('div');
  div.innerHTML = `<span>${user}:</span> ${msg}`;
  const messages = document.getElementById('messages');
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

socket.on('chat-message', (user, msg) => addMessage(user, msg));

socket.on('user-joined', (user, users) => {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  users.forEach(u => {
    const li = document.createElement('li');
    li.textContent = u;
    list.appendChild(li);
  });
  if (user !== username) addMessage('System', user + ' join ho gaya! 🎉');
});

socket.on('user-left', (user, users) => {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  users.forEach(u => {
    const li = document.createElement('li');
    li.textContent = u;
    list.appendChild(li);
  });
  addMessage('System', user + ' chala gaya! 👋');
});

// Mic
async function toggleMic() {
  const btn = document.getElementById('btn-mic');
  if (!isMicOn) {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      isMicOn = true;
      btn.textContent = '🎙️ Mic OFF';
      btn.classList.add('active');
    } catch(e) {
      alert('Mic permission do browser mein!');
    }
  } else {
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    micStream = null;
    isMicOn = false;
    btn.textContent = '🎙️ Mic ON';
    btn.classList.remove('active');
  }
}
</script>
</body>
</html>
