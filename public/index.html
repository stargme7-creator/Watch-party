<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchParty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0d0e15; color: #ffffff; font-family: sans-serif; }
        .pink-glow { text-shadow: 0 0 10px #ff007f; }
        .panel-bg { background-color: #141622; border: 1px solid #1f2335; }
        #messages { height: 220px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg-item { margin-bottom: 6px; padding: 4px 8px; border-bottom: 1px solid #1f2335; }
        .msg-user { color: #ff007f; font-weight: bold; }
        iframe, video { width: 100%; height: 100%; border-radius: 8px; border: none; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold text-pink-500 pink-glow flex items-center gap-2">
            <i class="fa-solid fa-clapperboard"></i> WatchParty
        </h1>
        <div class="text-sm text-gray-400">Room ID: <span id="room-display-id" class="text-white font-mono font-bold">---</span></div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-4">
        <button class="bg-red-600 hover:bg-red-700 py-2 rounded font-bold text-sm flex items-center justify-center gap-2">
            <i class="fa-brands fa-youtube"></i> YouTube
        </button>
        <button class="bg-purple-600 hover:bg-purple-700 py-2 rounded font-bold text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-desktop"></i> Share
        </button>
        <button id="mic-toggle-btn" onclick="toggleMicPipeline()" class="bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-microphone-slash"></i> Mic Off
        </button>
    </div>

    <div class="flex gap-2 mb-4">
        <input type="text" id="video-url-input" placeholder="YouTube, Vimeo, Twitch ya MP4 Video Link paste karo..." class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-pink-500">
        <button onclick="playNewVideoFromInput()" class="bg-red-600 hover:bg-red-700 px-4 rounded text-white flex items-center justify-center">
            <i class="fa-solid fa-play"></i>
        </button>
    </div>

    <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden mb-4 panel-bg flex items-center justify-center">
        <div id="processing-overlay" class="absolute top-2 right-2 bg-black/80 border border-pink-500 px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-2 z-50 hidden">
            <i class="fa-solid fa-tv animate-pulse text-pink-500"></i> Video Load Processing...
        </div>
        <div id="player-container" class="w-full h-full">
            <div id="fallback-placeholder" class="w-full h-full flex flex-col items-center justify-center text-gray-500 p-4 text-center">
                <i class="fa-solid fa-film text-4xl mb-2"></i>
                <p class="font-semibold text-sm text-gray-300">YouTube ya Screen Share karo</p>
                <p class="text-xs text-gray-500 mt-1">Screen share sirf PC Chrome pe</p>
            </div>
        </div>
    </div>

    <div class="flex justify-between bg-gray-900/50 p-2 rounded-lg mb-4 border border-gray-800">
        <button onclick="sendReaction('❤️')" class="text-xl transform hover:scale-125 transition">❤️</button>
        <button onclick="sendReaction('😂')" class="text-xl transform hover:scale-125 transition">😂</button>
        <button onclick="sendReaction('😮')" class="text-xl transform hover:scale-125 transition">😮</button>
        <button onclick="sendReaction('😢')" class="text-xl transform hover:scale-125 transition">😢</button>
        <button onclick="sendReaction('👏')" class="text-xl transform hover:scale-125 transition">👏</button>
        <button onclick="sendReaction('🔥')" class="text-xl transform hover:scale-125 transition">🔥</button>
        <button onclick="sendReaction('💀')" class="text-xl transform hover:scale-125 transition">💀</button>
    </div>

    <div class="panel-bg p-3 rounded-lg mb-4">
        <h3 class="text-pink-400 font-bold text-xs uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i class="fa-solid fa-users text-xs"></i> Online Users
        </h3>
        <div id="user-list" class="space-y-1 text-sm font-medium text-gray-300"></div>
    </div>

    <div class="panel-bg p-3 rounded-lg flex flex-col justify-between">
        <h3 class="text-pink-400 font-bold text-xs uppercase tracking-wider mb-2 flex items-center gap-1.5">
            <i class="fa-solid fa-comments text-xs"></i> Live Chat
        </h3>
        <div id="messages" class="mb-2"></div>
        <div class="flex gap-2 border-t border-gray-800 pt-2">
            <input type="text" id="msg-input" onkeypress="if(event.key==='Enter') sendMessage()" placeholder="Kuch likho..." class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-1.5 text-sm text-white focus:outline-none focus:border-pink-500">
            <button onclick="sendMessage()" class="bg-pink-600 hover:bg-pink-700 px-4 rounded text-xs font-bold text-white uppercase">Send</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const state = {
            roomId: urlParams.get('room') || 'ROOM_' + Math.floor(1000 + Math.random() * 9000),
            username: urlParams.get('username') || 'User_' + Math.floor(Math.random() * 100),
            micActive: false,
            localStream: null
        };

        document.getElementById('room-display-id').innerText = state.roomId;
        const socket = io();
        socket.emit('join-room', { roomId: state.roomId, username: state.username });

        // 1. Multi Platform Engine Converter
        function parseVideoId(url) {
            if (!url) return null;
            url = url.trim();
            if (url.match(/\.(mp4|webm|ogg|m3u8)($|\?)/i)) return { type: 'raw', id: url };
            
            const ytRegex = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const ytMatch = url.match(ytRegex);
            if (ytMatch && ytMatch[2].length === 11) return { type: 'youtube', id: ytMatch[2] };

            const vimeoRegex = /(?:vimeo)\.com.*(?:plugins\/video\/|video\/|\/)([0-9]+)/;
            const vimeoMatch = url.match(vimeoRegex);
            if (vimeoMatch) return { type: 'vimeo', id: vimeoMatch[1] };
            return null;
        }

        function playNewVideoFromInput() {
            const urlInput = document.getElementById('video-url-input');
            const mediaMeta = parseVideoId(urlInput.value);
            if (mediaMeta) {
                showOverlay(true);
                socket.emit('video-sync', state.roomId, { action: 'loadNewVideo', meta: mediaMeta });
                renderActivePlayer(mediaMeta);
                urlInput.value = '';
            } else {
                alert("Link supported nahi hai bhai!");
            }
        }

        function renderActivePlayer(meta) {
            const container = document.getElementById('player-container');
            if (meta.type === 'youtube') {
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${meta.id}?enablejsapi=1&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } else if (meta.type === 'vimeo') {
                container.innerHTML = `<iframe src="https://player.vimeo.com/video/${meta.id}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            } else if (meta.type === 'raw') {
                container.innerHTML = `<video controls autoplay class="w-full h-full"><source src="${meta.id}" type="video/mp4"></video>`;
            }
            setTimeout(() => showOverlay(false), 800);
        }

        function showOverlay(v) {
            const o = document.getElementById('processing-overlay');
            if (v) o.classList.remove('hidden'); else o.classList.add('hidden');
        }

        // 2. Straight Chat Sequence Fix
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg) return;
            socket.emit('chat-message', state.roomId, state.username, msg);
            input.value = '';
        }

        socket.on('receive-chat', ({ user, msg }) => {
            const box = document.getElementById('messages');
            const item = document.createElement('div');
            item.className = 'msg-item';
            item.innerHTML = `<span class="msg-user">${user}:</span> ${msg}`;
            box.appendChild(item);
            box.scrollTop = box.scrollHeight;
        });

        // 3. WebRTC Mic Controls 
        async function toggleMicPipeline() {
            const btn = document.getElementById('mic-toggle-btn');
            if (!state.micActive) {
                try {
                    state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    state.micActive = true;
                    btn.innerHTML = `<i class="fa-solid fa-microphone text-green-400"></i> Mic On`;
                    btn.className = "bg-green-700 hover:bg-green-800 py-2 rounded font-bold text-sm flex items-center justify-center gap-2";
                    socket.emit('mic-status-change', { roomId: state.roomId, micActive: true });
                } catch (err) {
                    alert("Mic blocked hai bhai!");
                }
            } else {
                if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
                state.micActive = false;
                btn.innerHTML = `<i class="fa-solid fa-microphone-slash"></i> Mic Off`;
                btn.className = "bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold text-sm flex items-center justify-center gap-2";
                socket.emit('mic-status-change', { roomId: state.roomId, micActive: false });
            }
        }

        socket.on('video-sync', (data) => {
            if (data && data.action === 'loadNewVideo' && data.meta) {
                showOverlay(true);
                renderActivePlayer(data.meta);
            }
        });

        socket.on('user-joined', (u, roomUsers) => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            roomUsers.forEach(user => {
                list.innerHTML += `<div class="flex items-center gap-2"><i class="fa-solid fa-ticket text-pink-500"></i> <span>${user}</span></div>`;
            });
        });

        socket.on('user-left', (u, roomUsers) => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            roomUsers.forEach(user => {
                list.innerHTML += `<div class="flex items-center gap-2"><i class="fa-solid fa-ticket text-pink-500"></i> <span>${user}</span></div>`;
            });
        });

        function sendReaction(emoji) { socket.emit('reaction', state.roomId, emoji); }
    </script>
</body>
</html>
